  <!DOCTYPE html>
  <html lang="fr">
  <head>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

    <script type="text/javascript">
      aclib.runAutoTag({
          zoneId: 'eggoze90yi',
      });
  </script>

    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

<div class="login-container">

  <div class="login-card">

    <h1>👤 Mon Profil</h1>
    <p class="login-sub">Gère ton compte Cash Arena</p>

    <p id="email"></p>
    <p id="balance"></p>

    <!-- Lier compte -->
    <div id="linkSection">
      <h3>Lier Brawl Stars</h3>

      <div class="input-group">
        <input type="text" id="brawlTag" placeholder="#PLAYER_TAG">
      </div>

      <button onclick="linkBrawl()">Lier mon compte</button>

      <p id="brawlResult"></p>
    </div>

    <!-- Affichage compte -->
    <p id="brawlSaved" style="margin-top:15px;"></p>

    <button onclick="logout()" style="margin-top:20px; background:#ef4444;">
      Se déconnecter
    </button>

  </div>

</div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="firebase.js"></script>

 <script>
auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location = "index.html";
    return;
  }

  document.getElementById("email").innerText = "📧 " + user.email;

  const doc = await db.collection("users").doc(user.uid).get();

  if (doc.exists) {
    const data = doc.data();

    document.getElementById("balance").innerText =
      "💰 Solde : " + (data.balance || 0) + "€";

    if (data.brawlName && data.brawlTag) {

      // ✅ afficher compte lié
      document.getElementById("brawlSaved").innerText =
        `🎮 ${data.brawlName} (${data.brawlTag}) | 🏆 ${data.brawlTrophies || 0}`;

      // 🔥 cacher la section
      document.getElementById("linkSection").style.display = "none";

    } else {

      document.getElementById("brawlSaved").innerText =
        "Aucun compte Brawl Stars lié.";

      // montrer la section si pas lié
      document.getElementById("linkSection").style.display = "block";
    }
  }
});

function logout(){
  auth.signOut().then(() => window.location = "index.html");
}

async function linkBrawl() {
  const input = document.getElementById("brawlTag").value.trim();
  if (!input) {
    alert("Entre ton tag Brawl Stars !");
    return;
  }
  try {
    const cleanTag = input.startsWith("#") ? input : "#" + input;
    const res = await fetch(`https://cash-arena-api.onrender.com/api/brawl/player/${encodeURIComponent(cleanTag)}`);
    const data = await res.json();
    if (!res.ok || data.error) {
      alert("Erreur : " + (data.message || "Impossible de récupérer le joueur"));
      return;
    }
    document.getElementById("brawlResult").innerText =
      `✅ Joueur : ${data.name} | 🏆 Trophées : ${data.trophies}`;
    const user = auth.currentUser;
    await db.collection("users").doc(user.uid).update({
      brawlTag: data.tag,
      brawlName: data.name,
      brawlTrophies: data.trophies,
      brawlHighestTrophies: data.highestTrophies || 0,
      brawlExpLevel: data.expLevel || 0,
      brawlClubName: data.club?.name || "",
      updatedAt: new Date()
    });
    alert("Compte Brawl Stars lié avec succès !");
  } catch (e) {
    console.error(e);
    alert("Erreur de connexion au serveur");
  }

  document.getElementById("linkSection").style.display = "none";
}
</script>

<div id="linkSection">
  <h3>Lier mon compte Brawl Stars</h3>

  <input type="text" id="brawlTag" placeholder="#PLAYER_TAG">
  <button onclick="linkBrawl()">Lier mon compte</button>

  <p id="brawlResult"></p>
</div>

<p id="brawlSaved"></p>

</script>
