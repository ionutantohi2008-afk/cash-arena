<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

  <script type="text/javascript">
    aclib.runAutoTag({
        zoneId: 'eggoze90yi',
    });
  </script>

  <meta charset="UTF-8">
  <title>Profil</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav style="display:flex; justify-content:space-between; padding:15px; background:#111827;">
  <div>
    <a href="index.html" style="color:#22c55e; text-decoration:none;">Accueil</a>
  </div>

  <div>
    <button onclick="goHome()">⬅ Retour</button>
  </div>
</nav>

<div class="login-container">

  <div class="login-card">

    <h1>👤 Mon Profil</h1>
    <p class="login-sub">Gère ton compte Cash Arena</p>

    <p id="email"></p>
    <p id="balance"></p>

<div id="pseudoSection">

  <!-- FORMULAIRE -->
  <div id="pseudoForm">
    <h3>Choisir mon pseudo</h3>

    <input type="text" id="pseudoInput" placeholder="Ton pseudo">
    <button onclick="savePseudo()">Enregistrer</button>
  </div>

  <!-- AFFICHAGE -->
  <div id="pseudoDisplay" style="display:none;">
    <p id="pseudoText"></p>

    <button onclick="editPseudo()" style="margin-left:10px;">
      ✏️
    </button>
  </div>

</div>

    <!-- Lier compte -->
    <div id="linkSection">
      <h3>Lier Brawl Stars</h3>

      <div class="input-group">
        <input type="text" id="brawlTag" placeholder="#PLAYER_TAG">
      </div>

      <button onclick="linkBrawl()">Lier mon compte</button>

      <p id="brawlResult"></p>
    </div>

    <!-- Affichage compte -->
    <p id="brawlSaved" style="margin-top:15px;"></p>

    <button onclick="logout()" style="margin-top:20px; background:#ef4444;">
      Se déconnecter
    </button>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<script>
auth.onAuthStateChanged(async user => {
  if (!user) {
    window.location = "index.html";
    return;
  }

  document.getElementById("email").innerText = "📧 " + user.email;

  const doc = await db.collection("users").doc(user.uid).get();

  if (doc.exists) {
    const data = doc.data();

   if (data.pseudo) {
  document.getElementById("pseudoText").innerText =
    "🎮 Pseudo : " + data.pseudo;

  document.getElementById("pseudoForm").style.display = "none";
  document.getElementById("pseudoDisplay").style.display = "block";

} else {
  document.getElementById("pseudoForm").style.display = "block";
  document.getElementById("pseudoDisplay").style.display = "none";
}

    document.getElementById("balance").innerText =
      "💰 Solde : " + (data.balance || 0) + "€";

    if (data.brawlName && data.brawlTag) {

      document.getElementById("brawlSaved").innerText =
        `🎮 ${data.brawlName} (${data.brawlTag}) | 🏆 ${data.brawlTrophies || 0}`;

      document.getElementById("linkSection").style.display = "none";

    } else {
      document.getElementById("brawlSaved").innerText =
        "Aucun compte Brawl Stars lié.";
    }
  }
});

function logout(){
  auth.signOut().then(() => window.location = "index.html");
}

async function linkBrawl() {
  const input = document.getElementById("brawlTag").value.trim();

  if (!input) {
    alert("Entre ton tag !");
    return;
  }

  try {
    const cleanTag = input.startsWith("#") ? input : "#" + input;

    const res = await fetch(`https://TON-URL-RENDER.onrender.com/api/brawl/player/${encodeURIComponent(cleanTag)}`);
    const data = await res.json();

    if (!res.ok || data.error) {
      alert("Erreur : " + (data.message || "Impossible"));
      return;
    }

    document.getElementById("brawlResult").innerText =
      `✅ ${data.name} | 🏆 ${data.trophies}`;

    const user = auth.currentUser;

    await db.collection("users").doc(user.uid).update({
      brawlTag: data.tag,
      brawlName: data.name,
      brawlTrophies: data.trophies
    });

    document.getElementById("linkSection").style.display = "none";
    document.getElementById("brawlSaved").innerText =
      `🎮 ${data.name} (${data.tag}) | 🏆 ${data.trophies}`;

  } catch (e) {
    alert("Erreur API");
  }
}

async function savePseudo() {
  const pseudo = document.getElementById("pseudoInput").value.trim();
  const user = auth.currentUser;

  if (!pseudo) {
    alert("Entre un pseudo !");
    return;
  }

  if (pseudo.length < 3) {
    alert("Minimum 3 caractères !");
    return;
  }

  await db.collection("users").doc(user.uid).update({
    pseudo: pseudo
  });

  // afficher directement
  document.getElementById("pseudoText").innerText =
    "🎮 Pseudo : " + pseudo;

  document.getElementById("pseudoForm").style.display = "none";
  document.getElementById("pseudoDisplay").style.display = "block";

  alert("Pseudo enregistré !");
}

function editPseudo() {
  document.getElementById("pseudoForm").style.display = "block";
  document.getElementById("pseudoDisplay").style.display = "none";
}

</script>

</body>
</html>
