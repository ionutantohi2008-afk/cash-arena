<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Profil</title>
</head>
<body>

<h1>Mon Profil</h1>

<p id="email"></p>
<p id="balance"></p>

<button onclick="logout()">Se déconnecter</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<script>
auth.onAuthStateChanged(async user => {
  if(!user){
    window.location = "index.html";
    return;
  }

  document.getElementById("email").innerText = "📧 " + user.email;

  const doc = await db.collection("users").doc(user.uid).get();
  document.getElementById("balance").innerText =
    "💰 Solde : " + doc.data().balance + "€";
});

<nav style="display:flex; justify-content:space-between; padding:15px; background:#111827;">
  <div>
    <a href="index.html" style="color:#22c55e; text-decoration:none;">Accueil</a>
  </div>

  <div>
    <button onclick="goHome()">⬅ Retour</button>
  </div>
</nav>

function logout(){
  auth.signOut().then(() => window.location = "index.html");
}
</script>

</body>
</html>
